<html>
    <head>
        <title>bank loan form</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <h1 class="title">State Bank of India</h1>
        <P class="formname">Personal loan Application</P>

        <p class="bad">Banglore,Karnataka</p>
        <p class="bad">Date</p>
        <hr>
        <div class="personaldetails">
            <h4>Personal Details</h4>
            
            <from>
                <label>First Name :</label>
                <input type="text">

                <br>

                <label>Last Name :</label>
                <input type="text">

                <br>

                <label>Gender :</label>
                <input type="radio"name="gender">MALE
                <input type="radio"name="gender">FEMALE
                
                <br>

                <label>Date Of Birth :</label>
                <input type="date">

                <br>

                <label>UID :</label>
                <input tyoe="text">

                <br>

            </from>
        </div>
        <hr>
        <div class="address">
            <h4>Address</h4>
            <label>Area :</label>
            <input type="text">

            <br>

            <label>Street :</label>
            <input type="text">

            <br>

            <label>Pincode :</label>
            <input type="text">
            
            <br>

            <label>Country :</label>
            <select>
                <option>India</option>
                <option>Nepal</option>
                <option>Bhutan</option>
                <option>Srilanka</option>
            </select>
            <br>

        </div>
        <hr>

        <div class="loan">
            <h4>Loan Details</h4>
            <label>Loan Amount :</label>
            <input type="text">
            <br>

            <label>Account Number :</label>
            <input type="text">
            <br>

            <label>IFSC Code :</label>
            <input type="text">
            <br>

            <label>Type Of Account</label>

            <input type="radio"name="type-acc">Savings
            <input type="radio"name="type-acc">Current
            <br>

            <label>Credit Type</label>
            <input type="checkbox">Cash
            <input type="checkbox">Cheque
            <br>

            <label>Tenure</label>
            <select>
                <option>6 Months</option>
                <option>12 Months</option>
                <option>18 Months</option>
                <option>24 Months</option>
             </select>
             <br>

             <p class="sign">Signature</p>
             


        </div>
        <hr>
        <h1 class="title">Thank you</h1>
    </body>
</html>
